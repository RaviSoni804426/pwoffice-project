server {
    listen 80;
    server_name pwoffice.example.com;

    # Size limit for document uploads
    client_max_body_size 100M;

    # Serve the PW Office Web App at the root
    location / {
        proxy_pass http://webapp:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy ONLYOFFICE API and editor requests to ONLYOFFICE Document Server
    # Note: ONLYOFFICE static scripts and resources are under /web-apps/
    location /web-apps/ {
        proxy_pass http://documentserver:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ONLYOFFICE backend services (DocService / FileConverter)
    location ~* ^/(5.5.0-|6.0.0-|6.1.0-|6.2.0-|6.3.0-|6.4.0-|7.0.0-|7.1.0-|7.2.0-|7.3.0-|7.4.0-|7.5.0-|8.0.0-|8.1.0-|8.2.0-|9.0.0-|cache|docservice|heartbeat|info) {
        proxy_pass http://documentserver:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # Upstream configuration
    upstream webapp {
        server webapp:3000; # Points to the webapp container
    }

    upstream docserver {
        server docserver:80; # Points to the Document Server container
    }

    # ==========================================================
    # LOCAL DEVELOPMENT: Plain HTTP on port 80
    # For production with a real domain, comment out this block
    # and uncomment the HTTPS blocks below.
    # ==========================================================
    server {
        listen 80;
        server_name localhost;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 1. Route ONLYOFFICE Document Server traffic
        location = /healthcheck {
            proxy_pass http://docserver;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~* ^/([a-zA-Z0-9._-]+/)?(web-apps|sdkjs|sdkjs-plugins|sdk|openlayers|services|office-shared|cache|doc|heartbeat|shards|ds-vpath|coauthoring|welcome|fonts|dictionaries|meta)/ {
            proxy_pass http://docserver;
            proxy_http_version 1.1;

            # Support WebSockets for real-time document collaboration
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for active collaboration sessions
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # 2. Route PW Office WebApp traffic (default)
        location / {
            proxy_pass http://webapp;
            proxy_http_version 1.1;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Apply Nginx-level rate limits on auth requests
            location ~* ^/(login|signup) {
                limit_req zone=auth_limit burst=10 nodelay;
                proxy_pass http://webapp;
            }
        }
    }

    # ==========================================================
    # PRODUCTION: Uncomment these blocks when deploying to a real
    # domain with a valid Let's Encrypt certificate.
    # Also comment out the localhost HTTP block above.
    # ==========================================================


events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # Upstream configuration
    upstream webapp {
        server webapp:3000; # Points to the webapp container
    }

    upstream docserver {
        server docserver:80; # Points to the Document Server container
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name pwoffice.example.com; # Replace with production domain

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server Configuration
    server {
        listen 443 ssl http2;
        server_name pwoffice.example.com; # Replace with production domain

        # SSL Certificates (managed by Let's Encrypt / Certbot)
        ssl_certificate /etc/letsencrypt/live/pwoffice.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pwoffice.example.com/privkey.pem;

        # SSL Optimizations
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Security Headers (Helmet matches this, Nginx enforces at proxy)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "frame-ancestors 'self' pwoffice.example.com http://localhost;" always;

        # 1. Route ONLYOFFICE Document Server traffic
        # ONLYOFFICE editor components and API paths
        location = /healthcheck {
            proxy_pass http://docserver;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~* ^/([0-9.-]+[a-zA-Z0-9]*)?/(web-apps|sdk|openlayers|services|office-shared|cache|doc|heartbeat|shards|ds-vpath|coauthoring)/ {
            proxy_pass http://docserver;
            proxy_http_version 1.1;
            
            # Support WebSockets for real-time document collaboration
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts for active collaboration sessions
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # 2. Route PW Office WebApp traffic (default)
        location / {
            proxy_pass http://webapp;
            proxy_http_version 1.1;
            
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Apply Nginx-level rate limits on auth requests if forwarded here
            location ~* ^/(login|signup) {
                limit_req zone=auth_limit burst=10 nodelay;
                proxy_pass http://webapp;
            }
        }
    }
}

			<h1>PI funkcija</h1>
			<p><b>PI</b> funkcija je jedna od <a href="../UsageInstructions/InsertFunction.htm#mathtrigonometry" onclick="onhyperlinkclick(this)">matematičkih i trigonometrijskih funkcija</a>. Funkcija vraća matematičku konstantu <b>pi</b>, jednaku <b>3.14159265358979</b>. <b>Ne</b> zahteva nikakav argument.</p>			
			<h3>Sintaksa</h3> 
			<p><b><em>PI()</em></b></p> 			
            <h3>Napomene</h3>
            <p><a href="../UsageInstructions/InsertFunction.htm#applyfunction" onclick="onhyperlinkclick(this)">Kako primeniti</a> <b>PI</b> funkciju.</p>
			
			<h3>Primeri</h3>
            <p>Slika ispod prikazuje rezultat koji vraća <b>PI</b> funkcija.</p>
